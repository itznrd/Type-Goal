<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TYPE GOAL</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@100..800&display=swap" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&family=Lexend+Deca:wght@100..900&family=Roboto+Mono:ital,wght@0,100..700;1,100..700&display=swap" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="css/main.css">
</head>
<body>
    <div id="top-space" class="space"></div>
    <div id="nav-bar" class="jar"><img src="logo.png" alt="logo" style="height: 50%; margin-left: 20px; opacity: 0.5;"><span style="margin-left: 10px; color: rgb(241, 241, 241); font-size: x-large; font-family: Lexend Deca, sans-serif;">TYPE GOAL</span></div>
    <div id="nav-space" class="space"></div>
    <div id="test-settings-area" class="jar">
        <button id="test-settings">Test Settings</button>
    </div>

    <div id="test-settings-overlay" class="hidden" aria-hidden="true">
        <div id="test-settings-popup" role="dialog" aria-modal="true">
            <div id="ts-content">
                <div id="test-mode">
                    <div id="tm-time" class="test-btn">Time</div>
                    <div id="tm-words" class="test-btn" style="color: rgba(97, 97, 97, 0.666);">coming soon</div>
                </div>
                <div id="tm-space" class="space"></div>
                <div id="test-value">
                    <div id="value1" class="test-btn">15</div>
                    <div id="value2" class="test-btn">30</div>
                    <div id="value3" class="test-btn">60</div>
                </div>
            </div>
        </div>
    </div>

    <div id="stats-overlay" class="hidden" aria-hidden="true">
        <div id="stats-overlay-content" style="position: relative; width: 100%; height: 100%;">
            <div id="container">
                <div class="big-boxes">
                    <div class="box"><div class="stat-label">wpm</div><div class="stat-value" id="stats-wpm">0</div></div>
                    <div class="box"><div class="stat-label">accuracy</div><div class="stat-value" id="stats-accuracy">00</div></div>
                </div>
                <div class="small-boxes">
                    <div class="box"><div class="stat-label">raw</div><div class="stat-value" id="stats-raw">00</div></div>
                    <div class="box"><div class="stat-label">char</div><div class="stat-value" id="stats-char">00</div></div>
                    <div class="box"><div class="stat-label">time</div><div class="stat-value" id="stats-time">00</div></div>
                </div>
            </div>
        </div>
    </div>

    <div id="settings-space" class="space">
        <div id="live-value-block">
            <div id="live-value-area">
                <div id="countdown-timer" class="hidden" style="font-family: Roboto Mono, monospace; font-size: 30px; color: rgb(214, 195, 195);">00</div>
            </div>
            <div style="color:rgb(255, 0, 0)">beta</div>
        </div>
    </div>

    <div id="text-box-area">
        <div class="tt-component-root">
            <section class="tt-container">
                <div class="tt-textBox">
                    <div class="tt-lineViewport"></div>
                    <div class="tt-caret"></div>
                </div>
                <div class="tt-focusOverlay"><div class="focusHint">Click here or press any key to focus</div></div>
            </section>
            <input type="text" class="tt-hiddenInput" aria-hidden="true" inputmode="text" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" />
        </div>
    </div>

    <div id="textbox-space" class="space"></div>
    <div id="retry-area" class="jar">
        <svg id="retry" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 125" width="40" height="40" style="fill:#d1d0c5;cursor:pointer;"><path d="M85.6,35.6l-11.3,6.7c2.4,4.1,3.7,8.9,3.7,14c0,15.5-12.6,28-28,28s-28-12.6-28-28c0-15.4,12.6-28,28-28V41l30.7-19.2L50,2.5v12.7c-22.7,0-41.2,18.5-41.2,41.2C8.8,79,27.3,97.5,50,97.5c22.7,0,41.2-18.5,41.2-41.2C91.2,48.8,89.1,41.7,85.6,35.6z"/></svg>
    </div>
    <div id="retry-space" class="space"></div>
    <div id="shortcut-area" class="jar"></div>
    <div id="shortcut-space" class="space"></div>
    <footer class="jar"></footer>

    <!-- JavaScript -->
    <script src="js/settings.js"></script>
    <script src="js/stats-overlay.js"></script>
    <script src="js/type-test.js"></script>
</body>
</html>
